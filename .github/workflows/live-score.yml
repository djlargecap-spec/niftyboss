name: Live Score Update

on:
  schedule:
    # Every 5 min during IPL match windows (10:00–18:00 UTC = 3:30 PM–11:30 PM IST)
    - cron: '*/5 10-18 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger live score cron
        run: |
          curl --fail --silent --show-error \
            -X GET "${{ vars.APP_URL }}/api/cron/live-score" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
